<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand Auth Clone</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- Login Section -->
<div class="container">

<div class="login-box">

<h1>Sign Up</h1>

<form>

<div class="input-group">
<input type="text" required minlength="3" placeholder="Username">
<label>Username</label>
</div>

<div class="input-group">
<input type="email" required placeholder="Email">
<label>Email</label>
</div>

<div class="input-group">
<input type="password" required minlength="6" placeholder="Password">
<label>Password</label>
</div>

<button type="submit">Create Account</button>

</form>

</div>

</div>


<!-- Team Section -->

<section class="team">

<h2>Our Team</h2>

<div class="team-grid">

<div class="card">
<img src="https://i.pravatar.cc/200?img=1" alt="Alex - Frontend Dev">
<h3>Alex</h3>
<p>Frontend Dev</p>

<div class="social">
<a href="#">LinkedIn</a>
<a href="#">GitHub</a>
</div>

</div>


<div class="card">
<img src="https://i.pravatar.cc/200?img=2" alt="Sam - UI Designer">
<h3>Sam</h3>
<p>UI Designer</p>

<div class="social">
<a href="#">LinkedIn</a>
<a href="#">GitHub</a>
</div>

</div>


<div class="card">
<img src="https://i.pravatar.cc/200?img=3" alt="Chris - Backend Dev">
<h3>Chris</h3>
<p>Backend Dev</p>

<div class="social">
<a href="#">LinkedIn</a>
<a href="#">GitHub</a>
</div>

</div>

</div>

</section>

</body>
</html>
